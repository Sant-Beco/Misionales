<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MISONALES · Incubant</title>
  <link rel="stylesheet" href="/static/css/incubant-theme.css">
  <link rel="icon" href="/static/img/logotipo_01.png" type="image/png">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

    .bg-egg-1 {
      width: 520px; height: 620px;
      right: -140px; top: -80px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(135deg, rgba(245,156,0,0.07), rgba(235,102,8,0.04));
      border: 1px solid rgba(245,156,0,0.06);
      position: absolute;
    }

    .bg-egg-2 {
      width: 280px; height: 330px;
      left: -80px; bottom: -60px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(135deg, rgba(255,204,0,0.05), rgba(245,156,0,0.03));
      border: 1px solid rgba(255,204,0,0.05);
      position: absolute;
    }

    .bg-glow {
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,156,0,0.08) 0%, transparent 65%);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .bg-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(245,156,0,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 1rem;
    }

    .login-card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.75rem 2.5rem 2.5rem;
      box-shadow: var(--shadow-lg), 0 0 60px rgba(245,156,0,0.06);
      animation: fadeUp 0.6s ease both;
    }

    .login-logo { text-align: center; margin-bottom: 1.75rem; }
    .login-logo img {
      height: 56px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 16px rgba(245,156,0,0.3));
    }

    .login-title { text-align: center; margin-bottom: 0.25rem; }
    .login-title h1 {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--grad-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .login-subtitle {
      text-align: center; font-size: 0.75rem;
      letter-spacing: 0.08em; color: var(--text3);
      text-transform: uppercase; margin-bottom: 1.75rem;
    }

    .sst-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(245,156,0,0.08);
      border: 1px solid rgba(245,156,0,0.15);
      border-radius: 20px; padding: 0.3rem 0.85rem;
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--amber);
      margin: 0 auto 1.75rem; width: fit-content;
      display: flex;
    }

    .sst-dot {
      width: 6px; height: 6px;
      background: var(--amber); border-radius: 50%;
      animation: pulse-amber 2s infinite;
    }

    .divider {
      display: flex; align-items: center;
      gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }

    .error-box {
      background: rgba(220,60,60,0.1);
      border: 1px solid rgba(220,60,60,0.25);
      border-radius: var(--r-md);
      padding: 0.75rem 1rem; font-size: 0.83rem;
      color: #f07070; margin-bottom: 1.25rem; display: none;
    }

    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute; left: 1rem; top: 50%;
      transform: translateY(-50%); font-size: 1rem;
      opacity: 0.45; pointer-events: none;
    }
    .input-wrapper .form-input { padding-left: 2.75rem; }

    .btn-submit {
      width: 100%; padding: 0.9rem;
      background: var(--grad-brand); border: none;
      border-radius: var(--r-md); color: #1a0f00;
      font-family: 'Futura', sans-serif; font-weight: 700;
      font-size: 0.88rem; letter-spacing: 0.12em;
      text-transform: uppercase; cursor: pointer;
      transition: all 0.25s;
      box-shadow: var(--shadow-amber); margin-top: 0.5rem;
    }
    .btn-submit:hover:not(:disabled) {
      filter: brightness(1.1); transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(245,156,0,0.45);
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-footer {
      margin-top: 1.75rem; text-align: center;
      font-size: 0.72rem; letter-spacing: 0.06em;
      color: var(--text3); text-transform: uppercase;
    }
    .login-footer em { color: var(--amber); font-style: normal; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(26,15,0,0.3);
      border-top-color: #1a0f00; border-radius: 50%;
      animation: spin 0.7s linear infinite; vertical-align: middle;
    }

    /* ══ RESPONSIVE ══ */

    /* En móvil el body no debe estar overflow:hidden cuando el teclado virtual aparece */
    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
        padding: 1.5rem 0 2rem;
      }

      .login-wrap {
        padding: 0.75rem;
        max-width: 100%;
      }

      .login-card {
        padding: 2rem 1.5rem 1.75rem;
        border-radius: var(--r-lg);
      }

      .login-logo img {
        height: 46px;
      }

      .login-title h1 {
        font-size: 1.3rem;
      }

      .login-subtitle {
        font-size: 0.7rem;
        margin-bottom: 1.25rem;
      }

      .sst-badge {
        font-size: 0.65rem;
        padding: 0.25rem 0.7rem;
        margin-bottom: 1.25rem;
      }

      .form-group { margin-bottom: 1rem; }

      .form-input { padding: 0.7rem 0.9rem 0.7rem 2.5rem; font-size: 0.9rem; }
      .input-icon { left: 0.8rem; font-size: 0.9rem; }

      .btn-submit {
        padding: 0.8rem;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
      }

      /* Fondo decorativo más pequeño en móvil */
      .bg-egg-1 { width: 280px; height: 330px; right: -80px; top: -60px; }
      .bg-egg-2 { width: 160px; height: 190px; left: -50px; bottom: -40px; }
      .bg-glow  { width: 360px; height: 360px; }
    }

    @media (max-width: 360px) {
      .login-card { padding: 1.5rem 1.1rem 1.5rem; }
      .login-title h1 { font-size: 1.15rem; }
      .login-logo img { height: 40px; }
    }

    /* Cuando el teclado virtual está activo (pantallas muy bajas) */
    @media (max-height: 600px) {
      body { align-items: flex-start; overflow-y: auto; padding: 1rem 0; }
      .login-logo { margin-bottom: 1rem; }
      .login-logo img { height: 40px; animation: none; }
      .login-title { margin-bottom: 0.15rem; }
      .login-subtitle { margin-bottom: 1rem; }
      .sst-badge { margin-bottom: 1rem; }
      .divider { margin-bottom: 1rem; }
      .login-footer { margin-top: 1rem; }
    }

  </style>
</head>
<body>

  <div class="bg-layer">
    <div class="bg-dots"></div>
    <div class="bg-glow"></div>
    <div class="bg-egg-1"></div>
    <div class="bg-egg-2"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <img src="/static/img/logotipo_01.png" alt="Incubant">
      </div>

      <div class="login-title"><h1>Misionales</h1></div>
      <p class="login-subtitle">Sistema de Inspección Vehicular</p>

      <div class="sst-badge">
        <div class="sst-dot"></div>
        SST · Conductores
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span>Acceso</span>
        <div class="divider-line"></div>
      </div>

      <!-- Banner sesión expirada / sin autorización -->
      <div id="sessionBanner" style="display:none;
        background:rgba(245,156,0,0.08); border:1px solid rgba(245,156,0,0.2);
        border-radius:var(--r-md); padding:0.75rem 1rem;
        font-size:0.82rem; color:var(--amber); margin-bottom:1.25rem;
        text-align:center; line-height:1.5;">
      </div>

      <div id="errorBox" class="error-box"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="nombre">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="nombre" name="nombre" class="form-input"
              placeholder="Tu nombre de usuario" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="pin">PIN de acceso</label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input type="password" id="pin" name="pin" class="form-input"
              placeholder="••••••" required inputmode="numeric" autocomplete="current-password">
          </div>
        </div>

        <button type="submit" id="btnLogin" class="btn-submit">
          Ingresar al sistema
        </button>
      </form>

      <div class="login-footer">
        <em>Incubant</em> · Antioqueña de Incubación S.A.S.
      </div>
    </div>
  </div>

  <script>
    localStorage.clear();
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('btnLogin');
    const err  = document.getElementById('errorBox');

    function showError(msg) {
      err.textContent = '⚠ ' + msg;
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 5000);
    }

    // Leer parámetros de la URL
    const _params  = new URLSearchParams(window.location.search);
    const _razon   = _params.get('razon');
    const _next    = _params.get('next') || '/';

    // Mostrar banner si viene redirigido por sesión expirada / sin acceso
    if (_razon) {
      const banner = document.getElementById('sessionBanner');
      banner.style.display = 'block';
      banner.textContent = _razon === '403'
        ? '⚠ No tienes permiso para acceder a esa sección.'
        : '⚠ Tu sesión expiró o no estás autenticado. Inicia sesión para continuar.';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>&nbsp;Verificando...';
      err.style.display = 'none';
      try {
        const res  = await fetch('/auth/login', { method: 'POST', body: new FormData(form) });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('usuario_id', data.usuario_id);
          localStorage.setItem('nombre', data.nombre);
          localStorage.setItem('rol', data.rol || 'user');
          btn.innerHTML = '✓ Acceso concedido';
          btn.style.background = 'linear-gradient(135deg,#28c878,#1a9c57)';
          setTimeout(() => { window.location.href = _next !== '/' ? _next : (data.rol === 'admin' ? '/admin' : '/'); }, 600);
        } else {
          showError(data.detail || 'Usuario o PIN incorrecto');
          btn.disabled = false;
          btn.innerHTML = 'Ingresar al sistema';
        }
      } catch {
        showError('Error de conexión. Intenta de nuevo.');
        btn.disabled = false;
        btn.innerHTML = 'Ingresar al sistema';
      }
    });
  </script>
</body>
</html>
